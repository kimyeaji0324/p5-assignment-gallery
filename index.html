<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>p5.js Assignment Gallery</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px;
      background: #111827;
      color: #f9fafb;
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: -1px;
    }

    .intro {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .gallery {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }

    .card {
      background: #1f2937;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
    }

    .card-title {
      padding: 16px 20px;
      font-size: 18px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    iframe {
      width: 100%;
      height: 420px;
      border: none;
      display: block;
      background: white;
    }

    footer {
      margin-top: 36px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 800px) {
      body {
        padding: 24px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 360px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>p5.js Assignment Gallery</h1>
    <p class="intro">
      지금까지 수행한 p5.js 과제 1~4를 하나의 웹사이트에 정리했습니다.<br />
      정적 작품과 동적 작품을 한 화면에서 바로 확인할 수 있도록 2행 2열 구조로 배치했습니다.
    </p>
  </header>

  <main class="gallery">
    <section class="card">
      <div class="card-title">과제 1</div>
      <iframe src="https://editor.p5js.org/ilskjy0324/full/NrgAn3iHT"></iframe>
    </section>

    <section class="card">
      <div class="card-title">과제 4</div>
      <iframe src="https://editor.p5js.org/ilskjy0324/full/Enb7n6zfk"></iframe>
    </section>

    <section class="card">
      <div class="card-title">과제 2</div>
      <iframe src="https://editor.p5js.org/ilskjy0324/full/2gN_wJaSe"></iframe>
    </section>

    <section class="card">
      <div class="card-title">과제 3</div>
      <iframe src="https://editor.p5js.org/ilskjy0324/full/MMlxttoqX7"></iframe>
    </section>
  </main>

  <footer>
    HTML의 iframe 태그와 CSS Grid를 활용하여 네 개의 p5.js 작품을 하나의 웹페이지에 배치했습니다.
  </footer>
</body>
</html>
</body>
</html>
